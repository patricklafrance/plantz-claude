name: Claude

on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]
    issues:
        types: [opened, assigned]
    pull_request_review:
        types: [submitted]

concurrency:
    group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
    claude:
        if: |
            (
                github.event_name == 'issue_comment' &&
                github.event.comment.user.type != 'Bot' &&
                contains(github.event.comment.body, '@claude') &&
                (
                    github.event.comment.author_association == 'OWNER' ||
                    github.event.comment.author_association == 'MEMBER' ||
                    github.event.comment.author_association == 'COLLABORATOR'
                )
            ) ||
            (
                github.event_name == 'pull_request_review_comment' &&
                github.event.comment.user.type != 'Bot' &&
                contains(github.event.comment.body, '@claude') &&
                (
                    github.event.comment.author_association == 'OWNER' ||
                    github.event.comment.author_association == 'MEMBER' ||
                    github.event.comment.author_association == 'COLLABORATOR'
                )
            ) ||
            (
                github.event_name == 'pull_request_review' &&
                contains(github.event.review.body, '@claude')
            ) ||
            (
                github.event_name == 'issues' &&
                (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))
            )

        runs-on: ubuntu-latest
        timeout-minutes: 60
        permissions:
            contents: write
            pull-requests: write
            issues: write
            id-token: write
            actions: read

        steps:
            - name: Acknowledge trigger
              run: |
                  if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
                    gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
                      -f content=eyes --silent
                  elif [[ "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
                    gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions \
                      -f content=eyes --silent
                  elif [[ "${{ github.event_name }}" == "issues" ]]; then
                    gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
                      -f content=eyes --silent
                  fi
              env:
                  GH_TOKEN: ${{ github.token }}

            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ">=24.0.0"
                  check-latest: true
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Restore Turborepo cache
              id: cache-turborepo-restore
              uses: actions/cache/restore@v5
              with:
                  key: ${{ runner.os }}-turbo-claude-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-claude-
                      ${{ runner.os }}-turbo-
                  path: .turbo

            - name: Run Claude
              id: claude
              uses: anthropics/claude-code-action@v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  prompt: |
                      Read and follow the instructions in .github/prompts/claude.md
              env:
                  GH_TOKEN: ${{ github.token }}

            - name: Save Turborepo cache
              id: cache-turborepo-save
              if: always() && steps.cache-turborepo-restore.outputs.cache-hit != 'true'
              uses: actions/cache/save@v5
              with:
                  key: ${{ steps.cache-turborepo-restore.outputs.cache-primary-key }}
                  path: .turbo
