name: Smoke tests

on:
    pull_request:
        branches:
            - main

env:
    CI: true

concurrency:
    group: smoke-tests-${{ github.ref }}
    cancel-in-progress: true

jobs:
    smoke-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        env:
            TURBO_TELEMETRY_DISABLED: "1"
        permissions:
            contents: read
            pull-requests: write
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ">=24.0.0"
                  check-latest: true
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              env:
                  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

            - name: Add node_modules/.bin to PATH
              run: echo "$PWD/node_modules/.bin" >> $GITHUB_PATH

            - name: Install browser
              run: agent-browser install --with-deps

            - name: Restore Turborepo cache
              id: cache-turborepo-restore
              uses: actions/cache/restore@v5
              with:
                  key: ${{ runner.os }}-turbo-smoke-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-smoke-
                      ${{ runner.os }}-turbo-
                  path: .turbo

            - name: Run smoke tests
              uses: anthropics/claude-code-action@v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  allowed_bots: "claude[bot]"
                  prompt: |
                      Load the `plantz-smoke-tests` skill and run smoke tests for the host application only.
                      If the app fails to start or has console errors, report the failure as a PR comment.
                      If the app passes, post a summary comment with the results table.
                  claude_args: >-
                      --allowedTools Read,Glob,Grep,Bash(pnpm:*,node:*,mkdir:*,rm:*,lsof:*,kill:*,pkill:*,agent-browser:*),Skill,Task*
              env:
                  GH_TOKEN: ${{ github.token }}

            - name: Upload smoke test artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: smoke-test-screenshots
                  path: ./tmp/smoke-tests/
                  retention-days: 7

            - name: Save Turborepo cache
              id: cache-turborepo-save
              if: always() && steps.cache-turborepo-restore.outputs.cache-hit != 'true'
              uses: actions/cache/save@v5
              with:
                  key: ${{ steps.cache-turborepo-restore.outputs.cache-primary-key }}
                  path: .turbo
